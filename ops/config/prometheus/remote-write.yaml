# Prometheus remote_write 설정 예시
# 이 파일을 prometheus.yaml의 remote_write 섹션에 병합하거나
# Helm values의 server.remoteWrite 로 전달하세요.

# ─────────────────────────────────────────────
# 기본 설정 (단일 테넌트)
# ─────────────────────────────────────────────
remote_write:
  - url: http://mimir-nginx.monitoring.svc.cluster.local/api/v1/push
    headers:
      X-Scope-OrgID: default
    queue_config:
      capacity: 2500
      max_shards: 200
      min_shards: 1
      max_samples_per_send: 10000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 5s
    # WAL replay 중 백프레셔 방지
    remote_timeout: 30s

---
